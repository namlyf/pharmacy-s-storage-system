<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập — Kho Dược</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            width: 380px;
        }
        h2 {
            text-align: center;
            color: #2c7be5;
            margin-bottom: 8px;
        }
        p.subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 24px;
            font-size: 14px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #444;
        }
        input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 15px;
        }
        input:focus { outline: none; border-color: #2c7be5; }
        button {
            width: 100%;
            padding: 11px;
            background: #2c7be5;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background: #1a68d1; }
        .msg-error {
            background: #fff0f0;
            color: #d9534f;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 14px;
            text-align: center;
        }
        .msg-success {
            background: #f0fff4;
            color: #28a745;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="login-box">
    <h2>🏥 Kho Dược</h2>
    <p class="subtitle">Bệnh viện Đại học Y Hà Nội</p>

    <div class="msg-error" th:if="${errorMsg}" th:text="${errorMsg}"></div>
    <div class="msg-success" th:if="${logoutMsg}" th:text="${logoutMsg}"></div>

    <form th:action="@{/login}" method="post">
        <label>Tên đăng nhập</label>
        <input type="text" name="username" placeholder="Nhập tên đăng nhập" required/>

        <label>Mật khẩu</label>
        <input type="password" name="password" placeholder="Nhập mật khẩu" required/>

        <button type="submit">Đăng nhập</button>
    </form>
</div>
</body>
</html>
