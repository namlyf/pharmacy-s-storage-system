<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Drug Form')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<div class="container mt-4" style="max-width: 800px;">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">
                <span th:if="${drugId == null}">
                    <i class="bi bi-plus-circle"></i> Add New Drug
                </span>
                <span th:unless="${drugId == null}">
                    <i class="bi bi-pencil"></i> Edit Drug
                </span>
            </h5>
        </div>
        <div class="card-body">
            <form th:action="${drugId == null} ? '/drugs/create' : '/drugs/edit/' + ${drugId}"
                  th:object="${drugRequest}" method="post">

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Drug Name *</label>
                        <input type="text" th:field="*{drugName}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('drugName')} ? ' is-invalid'">
                        <div class="invalid-feedback"
                             th:errors="*{drugName}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Active Ingredient *</label>
                        <input type="text" th:field="*{activeIngredient}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('activeIngredient')} ? ' is-invalid'">
                        <div class="invalid-feedback"
                             th:errors="*{activeIngredient}"></div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-bold">Concentration *</label>
                        <input type="text" th:field="*{concentration}"
                               class="form-control" placeholder="e.g. 500mg">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-bold">Dosage Form *</label>
                        <select th:field="*{dosageForm}" class="form-select">
                            <option value="">-- Select --</option>
                            <option th:each="form : ${dosageForms}"
                                    th:value="${form}"
                                    th:text="${form}"></option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-bold">Registration No. (SĐK) *</label>
                        <input type="text" th:field="*{registrationNumber}"
                               class="form-control" placeholder="e.g. VD-12345-12">
                        <small class="text-muted">
                            Category is auto-detected from this field.
                        </small>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Manufacturer *</label>
                        <input type="text" th:field="*{manufacturer}"
                               class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Country of Origin *</label>
                        <input type="text" th:field="*{countryOfOrigin}"
                               class="form-control">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-bold">Unit *</label>
                        <input type="text" th:field="*{unit}"
                               class="form-control" placeholder="e.g. box, vial">
                    </div>

                    <div class="col-md-8">
                        <label class="form-label fw-bold">Packaging Spec *</label>
                        <input type="text" th:field="*{packagingSpec}"
                               class="form-control"
                               placeholder="e.g. 10 tablets/blister, 10 blisters/box">
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-bold">Storage Condition</label>
                        <input type="text" th:field="*{storageCondition}"
                               class="form-control"
                               placeholder="e.g. Store below 25°C, protect from light">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-bold text-danger">Minimum Threshold (Alert) *</label>
                        <input type="number" th:field="*{minimumThreshold}"
                               class="form-control" min="0">
                        <small class="text-muted">Triggers alert when stock is below this level.</small>
                    </div>
                </div>
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i> Save
                    </button>
                    <a href="/drugs" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
