<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Thông tin thuốc')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<div class="container mt-4" style="max-width: 800px;">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">
                <span th:if="${drugId == null}">
                    <i class="bi bi-plus-circle"></i> Thêm thuốc mới
                </span>
                <span th:unless="${drugId == null}">
                    <i class="bi bi-pencil"></i> Chỉnh sửa thông tin thuốc
                </span>
            </h5>
        </div>
        <div class="card-body">
            <form th:action="${drugId == null} ? '/drugs/create' : '/drugs/edit/' + ${drugId}"
                  th:object="${drugRequest}" method="post">

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Tên thuốc *</label>
                        <input type="text" th:field="*{drugName}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('drugName')} ? ' is-invalid'">
                        <div class="invalid-feedback"
                             th:errors="*{drugName}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Hoạt chất *</label>
                        <input type="text" th:field="*{activeIngredient}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('activeIngredient')} ? ' is-invalid'">
                        <div class="invalid-feedback"
                             th:errors="*{activeIngredient}"></div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-bold">Hàm lượng *</label>
                        <input type="text" th:field="*{concentration}"
                               class="form-control" placeholder="Ví dụ: 500mg">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-bold">Dạng bào chế *</label>
                        <select th:field="*{dosageForm}" class="form-select">
                            <option value="">-- Chọn --</option>
                            <option th:each="form : ${dosageForms}"
                                    th:value="${form}"
                                    th:text="${form}"></option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-bold">Số đăng ký (SĐK) *</label>
                        <input type="text" th:field="*{registrationNumber}"
                               class="form-control" placeholder="Ví dụ: VD-12345-12">
                        <small class="text-muted">
                            Phân loại được tự động nhận diện từ trường này.
                        </small>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Nhà sản xuất *</label>
                        <input type="text" th:field="*{manufacturer}"
                               class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Nước sản xuất *</label>
                        <input type="text" th:field="*{countryOfOrigin}"
                               class="form-control">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-bold">Đơn vị tính *</label>
                        <input type="text" th:field="*{unit}"
                               class="form-control" placeholder="Ví dụ: hộp, lọ">
                    </div>

                    <div class="col-md-8">
                        <label class="form-label fw-bold">Quy cách đóng gói *</label>
                        <input type="text" th:field="*{packagingSpec}"
                               class="form-control"
                               placeholder="Ví dụ: 10 viên/vỉ, 10 vỉ/hộp">
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-bold">Điều kiện bảo quản</label>
                        <input type="text" th:field="*{storageCondition}"
                               class="form-control"
                               placeholder="Ví dụ: Bảo quản dưới 25°C, tránh ánh sáng">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-bold text-danger">Ngưỡng tồn kho tối thiểu *</label>
                        <input type="number" th:field="*{minimumThreshold}"
                               class="form-control" min="0">
                        <small class="text-muted">Hệ thống sẽ cảnh báo khi tồn kho thấp hơn mức này.</small>
                    </div>
                </div>
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i> Lưu
                    </button>
                    <a href="/drugs" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Hủy
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
