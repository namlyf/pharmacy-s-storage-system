<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/base :: head('Danh mục thuốc')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<div class="container-fluid mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4><i class="bi bi-capsule"></i> Danh mục thuốc</h4>
        <a href="/drugs/create" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Thêm thuốc
        </a>
    </div>

    <!-- Alerts -->
    <div th:if="${successMsg}" class="alert alert-success"
         th:text="${successMsg}"></div>
    <div th:if="${errorMsg}" class="alert alert-danger"
         th:text="${errorMsg}"></div>

    <!-- Search -->
    <form method="get" action="/drugs" class="mb-3">
        <div class="input-group" style="max-width: 400px;">
            <input type="text" name="keyword" class="form-control"
                   placeholder="Tìm tên thuốc..."
                   th:value="${keyword}">
            <button class="btn btn-outline-secondary" type="submit">
                <i class="bi bi-search"></i>
            </button>
        </div>
    </form>

    <!-- Table -->
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Tên thuốc</th>
                        <th>Hoạt chất</th>
                        <th>Hàm lượng</th>
                        <th>Dạng bào chế</th>
                        <th>Số đăng ký</th>
                        <th>Phân loại</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="drug, i : ${drugs}">
                        <td th:text="${i.count}"></td>
                        <td th:text="${drug.drugName}"></td>
                        <td th:text="${drug.activeIngredient}"></td>
                        <td th:text="${drug.concentration}"></td>
                        <td>
                            <span class="badge bg-secondary"
                                  th:text="${drug.dosageForm}"></span>
                        </td>
                        <td th:text="${drug.registrationNumber}"></td>
                        <td>
                            <span th:class="${drug.category.name() == 'MEDICINE'} ? 'badge bg-primary' :
                                            (${drug.category.name() == 'SUPPLEMENT'} ? 'badge bg-success' : 'badge bg-warning text-dark')"
                                  th:text="${drug.category}"></span>
                        </td>
                        <td>
                            <span th:if="${drug.active}" class="badge bg-success">Đang hoạt động</span>
                            <span th:unless="${drug.active}" class="badge bg-danger">Ngừng hoạt động</span>
                        </td>
                        <td>
                            <a th:href="@{/drugs/edit/{id}(id=${drug.drugID})}"
                               class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:if="${drug.active}"
                                  th:action="@{/drugs/deactivate/{id}(id=${drug.drugID})}"
                                  method="post" style="display:inline;">
                                <button class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('Ngừng hoạt động thuốc này?')">
                                    <i class="bi bi-x-circle"></i>
                                </button>
                            </form>
                            <form th:unless="${drug.active}"
                                  th:action="@{/drugs/activate/{id}(id=${drug.drugID})}"
                                  method="post" style="display:inline;">
                                <button class="btn btn-sm btn-outline-success">
                                    <i class="bi bi-check-circle"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(drugs)}">
                        <td colspan="9" class="text-center text-muted py-4">
                            Không tìm thấy thuốc.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
