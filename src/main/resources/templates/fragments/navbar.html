<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar(title)" style="
    background: #2c7be5; color: white;
    padding: 14px 24px;
    display: flex; justify-content: space-between; align-items: center;">

    <h1 style="font-size:18px;" th:text="${title}"></h1>

    <div style="display:flex; align-items:center; gap:12px;">
        <a th:href="@{/dashboard}" style="color:white; text-decoration:none;
            background:rgba(255,255,255,0.2); padding:6px 12px;
            border-radius:4px; font-size:14px;">🏠 Dashboard</a>

        <form th:action="@{/logout}" method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" style="
                background: rgba(255,255,255,0.2); color: white;
                border: none; padding: 6px 14px; border-radius: 4px;
                font-size: 14px; cursor: pointer;">
                Đăng xuất
            </button>
        </form>
    </div>
</nav>
</body>
</html>
