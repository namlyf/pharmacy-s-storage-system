<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/base :: head('Create Inspection Report')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<div class="container mt-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/warehouse/batches">Drug Batches</a></li>
            <li class="breadcrumb-item active">New Inspection Report</li>
        </ol>
    </nav>

    <h4><i class="bi bi-clipboard-plus"></i> BM.03 Receiving Inspection Report</h4>
    <hr>

    <div class="row mb-4">
        <div class="col-md-6">
            <div class="card bg-light border-0">
                <div class="card-body py-2">
                    <div class="row">
                        <div class="col-sm-4 text-muted">Drug:</div>
                        <div class="col-sm-8"><strong th:text="${batch.drug.drugName}"></strong></div>
                        <div class="col-sm-4 text-muted">Lot Number:</div>
                        <div class="col-sm-8"><code th:text="${batch.lotNumber}"></code></div>
                        <div class="col-sm-4 text-muted">Expiration:</div>
                        <div class="col-sm-8" th:text="${batch.expirationDate}"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <form th:action="@{/inspection/reports/create}" th:object="${reportRequest}" method="post" class="mb-5">
        <input type="hidden" th:field="*{batchId}">

        <div class="row">
            <!-- Left Column: Dates and Prices -->
            <div class="col-md-6">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-white fw-bold">General Information</div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Inspection Date</label>
                            <input type="date" th:field="*{inspectionDate}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">VAT Import Price (per unit)</label>
                            <div class="input-group">
                                <input type="number" th:field="*{vatPrice}" class="form-control" required step="0.01" min="0">
                                <span class="input-group-text">VND</span>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Storage Temperature (at inspection)</label>
                            <div class="input-group">
                                <input type="number" th:field="*{storageTemperature}" class="form-control" step="0.1">
                                <span class="input-group-text">°C</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-white fw-bold">Manual Compliance Checks</div>
                    <div class="card-body">
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" th:field="*{invoiceValid}" id="invoiceValid">
                            <label class="form-check-label" for="invoiceValid">Invoice is present and complete</label>
                        </div>
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" th:field="*{storageConditionMatch}" id="storageMatch">
                            <label class="form-check-label" for="storageMatch">Storage at warehouse matches label requirement</label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column: Visual Quality -->
            <div class="col-md-6">
                <div class="card shadow-sm mb-4 h-100">
                    <div class="card-header bg-white fw-bold">Visual Quality Assessment</div>
                    <div class="card-body">
                        <p class="small text-muted mb-3">
                            Checklist guidance for: <strong th:text="${batch.drug.dosageForm}"></strong>
                        </p>
                        <div id="checklistGuidance" class="alert alert-info small py-2 mb-3">
                            <!-- JS will populate this -->
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Assessment Details (Checklist Findings)</label>
                            <textarea th:field="*{visualQualityResult}" class="form-control" rows="8" required 
                                      placeholder="Describe sensory check results..."></textarea>
                        </div>
                    </div>

<script th:inline="javascript">
    const dosageForm = [[${batch.drug.dosageForm.name()}]];
    const checklists = {
        'TABLET': '• Color: no discoloration\n• Moisture: rattle test passed\n• Blister integrity: no cracks/chips',
        'CAPSULE': '• Shell integrity: not torn/open\n• No moisture: rattle test passed\n• No powder in empty slots',
        'COATED_TABLET': '• Smooth surface: no cracks/peeling\n• No sticking when shaken',
        'GRANULE': '• Moisture check: rattle test passed',
        'CREAM': '• Tube intact: not dented\n• Membrane not torn\n• No leakage',
        'SUPPOSITORY': '• Not melted\n• Intact shape\n• Packaging intact',
        'SYRUP': '• Clear: no sediment\n• No crystallization\n• No layer separation',
        'EYE_DROPS': '• Packaging intact\n• No discoloration\n• No sediment',
        'ORAL_AMPOULE': '• Uniform color\n• Clear\n• "Not for injection" label present',
        'INJECTION': '• No color change\n• No phase separation\n• No visible particles',
        'HERBAL': '• No mold or insects',
        'OTHER': '• General integrity and sensory check'
    };

    document.addEventListener('DOMContentLoaded', function() {
        const guidance = checklists[dosageForm] || checklists['OTHER'];
        document.getElementById('checklistGuidance').innerText = guidance;
    });
</script>
                </div>
            </div>
        </div>

        <div class="mt-3">
            <button type="submit" class="btn btn-primary px-5">
                <i class="bi bi-send-check"></i> Submit Inspection Report
            </button>
            <a href="/warehouse/batches" class="btn btn-secondary px-4 ms-2">Cancel</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
