<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/base :: head('Inspection Reports')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4><i class="bi bi-clipboard-check"></i> BM.03 Receiving Inspection Reports</h4>
    </div>

    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Date</th>
                        <th>Drug Name</th>
                        <th>Lot Number</th>
                        <th>Inspected By</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${reports}">
                        <td th:text="${r.inspectionDate}"></td>
                        <td th:text="${r.batch.drug.drugName}"></td>
                        <td><code th:text="${r.batch.lotNumber}"></code></td>
                        <td th:text="${r.inspectedBy.fullName}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${r.status.name() == 'APPROVED' ? 'bg-success' : 
                                                 (r.status.name() == 'PENDING' ? 'bg-warning' : 'bg-danger')}"
                                  th:text="${r.status}"></span>
                        </td>
                        <td>
                            <a th:href="@{/inspection/reports/view/{id}(id=${r.reportID})}"
                               class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-eye"></i> View
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${reports.empty}">
                        <td colspan="6" class="text-center py-4 text-muted">No inspection reports found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
