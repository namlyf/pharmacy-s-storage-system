<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/base :: head('Danh sách biên bản kiểm nhập')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4><i class="bi bi-clipboard-check"></i> BM.03 Danh sách biên bản kiểm nhập</h4>
    </div>

    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Ngày lập</th>
                        <th>Danh sách thuốc (Lô)</th>
                        <th>Người kiểm nhập</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${reports}">
                        <td th:text="${r.inspectionDate}"></td>
                        <td>
                            <ul class="list-unstyled mb-0 small">
                                <li th:each="item : ${r.items}">
                                    <i class="bi bi-dot"></i> [[${item.batch.drug.drugName}]] 
                                    (Lô: [[${item.batch.lotNumber}]])
                                </li>
                            </ul>
                        </td>
                        <td th:text="${r.inspectedBy.fullName}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${r.status.name() == 'APPROVED' ? 'bg-success' : 
                                                 (r.status.name() == 'PENDING' ? 'bg-warning' : 'bg-danger')}"
                                  th:text="${r.status.name() == 'APPROVED' ? 'Đã phê duyệt' : (r.status.name() == 'PENDING' ? 'Chờ duyệt' : 'Từ chối')}"></span>
                        </td>
                        <td>
                            <a th:href="@{/inspection/reports/view/{id}(id=${r.reportId})}"
                               class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-eye"></i> Xem chi tiết
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${reports.empty}">
                        <td colspan="6" class="text-center py-4 text-muted">Chưa có biên bản kiểm nhập nào.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
