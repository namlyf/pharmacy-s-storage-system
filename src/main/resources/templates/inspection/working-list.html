<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/base :: head('Danh sách chờ kiểm nhập')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4><i class="bi bi-list-task"></i> Danh sách thuốc đang chờ gửi duyệt (Working List)</h4>
        <div th:if="${!workingBatches.empty}">
            <form th:action="@{/inspection/reports/submit}" method="post">
                <button type="submit" class="btn btn-success">
                    <i class="bi bi-send-check"></i> Gửi biên bản tổng (BM.03)
                </button>
            </form>
        </div>
    </div>

    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Tên thuốc</th>
                        <th>Số lô</th>
                        <th>Giá nhập VAT</th>
                        <th>Cảm quan</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="b, iter : ${workingBatches}">
                        <td>
                            <strong th:text="${b.drug.drugName}"></strong><br>
                            <small class="text-muted" th:text="${b.drug.activeIngredient}"></small>
                        </td>
                        <td><code th:text="${b.lotNumber}"></code></td>
                        <td th:text="${workingList[iter.index].vatPrice}"></td>
                        <td th:text="${workingList[iter.index].visualQualityResult}"></td>
                        <td>
                            <form th:action="@{/inspection/reports/remove-from-list/{id}(id=${b.batchID})}" method="post">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-x-circle"></i> Loại bỏ
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${workingBatches.empty}">
                        <td colspan="5" class="text-center py-5 text-muted">
                            Chưa có thuốc nào trong danh sách chờ. <br>
                            <a href="/warehouse/batches" class="btn btn-link mt-2">Quay lại danh sách lô hàng</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
