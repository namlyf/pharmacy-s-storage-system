<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Stock List')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<div class="container-fluid mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4><i class="bi bi-box-seam"></i> All Stock</h4>
        <a href="/inventory/stocks/create" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Add Stock Entry
        </a>
    </div>

    <div th:if="${successMsg}" class="alert alert-success"
         th:text="${successMsg}"></div>
    <div th:if="${errorMsg}" class="alert alert-danger"
         th:text="${errorMsg}"></div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Drug Name</th>
                        <th>Category</th>
                        <th>Dosage Form</th>
                        <th>Current Qty</th>
                        <th>Min Threshold</th>
                        <th>Storage Location</th>
                        <th>Last Updated</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="s, i : ${stocks}"
                        th:classappend="${s.lowStock} ? 'table-warning'">
                        <td th:text="${i.count}"></td>
                        <td th:text="${s.drug.drugName}"></td>
                        <td>
                            <span class="badge bg-primary"
                                  th:text="${s.drug.category}"></span>
                        </td>
                        <td>
                            <span class="badge bg-secondary"
                                  th:text="${s.drug.dosageForm}"></span>
                        </td>
                        <td>
                            <strong th:classappend="${s.lowStock} ? 'text-danger'"
                                    th:text="${s.currentQuantity}"></strong>
                        </td>
                        <td th:text="${s.minimumThreshold}"></td>
                        <td th:text="${s.storageLocation ?: '–'}"></td>
                        <td th:text="${s.lastUpdated != null} ?
                            ${#temporals.format(s.lastUpdated, 'dd/MM/yyyy HH:mm')} : '–'">
                        </td>
                        <td>
                            <span th:if="${s.lowStock}"
                                  class="badge bg-danger">Low Stock</span>
                            <span th:unless="${s.lowStock}"
                                  class="badge bg-success">OK</span>
                        </td>
                        <td>
                            <a th:href="@{/inventory/stocks/edit/{id}(id=${s.stockID})}"
                               class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-pencil"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(stocks)}">
                        <td colspan="10" class="text-center text-muted py-4">
                            No stock entries yet.
                            <a href="/inventory/stocks/create">Add one now</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
