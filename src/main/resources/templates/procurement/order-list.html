<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/base :: head('Purchase Orders')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4><i class="bi bi-cart-check"></i> BM.02 Purchase Orders</h4>
    </div>

    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Order Date</th>
                        <th>Supplier</th>
                        <th>Created By</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="o : ${orders}">
                        <td th:text="${o.orderDate}"></td>
                        <td th:text="${o.supplier.supplierName}"></td>
                        <td th:text="${o.createdBy.fullName}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${o.status.name() == 'SENT' ? 'bg-primary' : 
                                                 (o.status.name() == 'DRAFT' ? 'bg-secondary' : 
                                                 (o.status.name() == 'RECEIVED' ? 'bg-success' : 'bg-info'))}"
                                  th:text="${o.status}"></span>
                        </td>
                        <td>
                            <a th:href="@{/purchase/orders/view/{id}(id=${o.orderID})}"
                               class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-eye"></i> View
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${orders.empty}">
                        <td colspan="5" class="text-center py-4 text-muted">No purchase orders found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
