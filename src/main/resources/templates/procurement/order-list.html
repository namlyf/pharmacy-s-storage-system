<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/base :: head('Đơn đặt hàng')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4><i class="bi bi-cart-check"></i> BM.02 Đơn đặt hàng</h4>
    </div>

    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Mã dự trù</th>
                        <th>Thời gian tạo</th>
                        <th>Nhà cung cấp</th>
                        <th>Người tạo</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="o : ${orders}">
                        <td>
                            <a th:href="@{/purchase/requisitions/view/{id}(id=${o.requisition.requisitionID})}"
                               class="text-decoration-none fw-bold">
                                <i class="bi bi-file-earmark-text"></i> [[${#strings.abbreviate(o.requisition.requisitionID, 8)}]]
                            </a>
                        </td>
                        <td>
                            <span th:text="${#temporals.format(o.createdAt, 'HH:mm dd/MM/yyyy')}"></span>
                        </td>
                        <td th:text="${o.supplier.supplierName}"></td>
                        <td th:text="${o.createdBy.fullName}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${o.status.name() == 'SENT' ? 'bg-primary' : 
                                                 (o.status.name() == 'DRAFT' ? 'bg-secondary' : 
                                                 (o.status.name() == 'RECEIVED' ? 'bg-success' : 'bg-info'))}"
                                  th:text="${o.status}"></span>
                        </td>
                        <td>
                            <a th:href="@{/purchase/orders/view/{id}(id=${o.orderID})}"
                               class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-eye"></i> Xem chi tiết
                            </a>
                            <form th:if="${o.status.name() == 'DRAFT'}"
                                  th:action="@{/purchase/orders/delete/{id}(id=${o.orderID})}"
                                  method="post" class="d-inline"
                                  onsubmit="return confirm('Bạn có chắc chắn muốn xóa đơn hàng nháp này?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-trash"></i> Xóa
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${orders.empty}">
                        <td colspan="6" class="text-center py-4 text-muted">Không tìm thấy đơn đặt hàng nào.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
