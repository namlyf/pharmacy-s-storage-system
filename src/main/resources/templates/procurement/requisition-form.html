<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/base :: head('Tạo dự trù')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<div class="container mt-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/purchase/requisitions">Dự trù & Đặt hàng</a></li>
            <li class="breadcrumb-item active">Dự trù mới</li>
        </ol>
    </nav>

    <h4><i class="bi bi-file-earmark-plus"></i> BM.01 Dự trù thuốc</h4>
    <hr>

    <form th:action="@{/purchase/requisitions/create}" th:object="${requisitionRequest}" method="post">
        
        <div class="card mb-4">
            <div class="card-header bg-light fw-bold">Thông tin chung</div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">Ghi chú</label>
                    <textarea th:field="*{notes}" class="form-control" rows="2" 
                              placeholder="Ghi chú chung cho đợt dự trù này..."></textarea>
                </div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header bg-light fw-bold d-flex justify-content-between align-items-center">
                Danh mục thuốc dự trù
                <button type="button" class="btn btn-sm btn-outline-primary" onclick="addRow()">
                    <i class="bi bi-plus-lg"></i> Thêm dòng
                </button>
            </div>
            <div class="card-body p-0">
                <table class="table table-bordered mb-0" id="itemsTable">
                    <thead class="table-light">
                        <tr>
                            <th style="width: 30%;">Thuốc/Vật tư</th>
                            <th style="width: 10%;">Số lượng</th>
                            <th style="width: 10%;">Đơn vị</th>
                            <th style="width: 20%;">Nhà cung cấp dự kiến</th>
                            <th style="width: 25%;">Lý do / Ghi chú</th>
                            <th style="width: 5%;"></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item, stat : *{items}">
                            <td>
                                <select th:field="*{items[__${stat.index}__].drugId}" class="form-select drug-select" required>
                                    <option value="">-- Chọn thuốc --</option>
                                    <option th:each="d : ${drugs}" th:value="${d.drugId}" 
                                            th:text="${d.drugName}"
                                            th:data-unit="${d.unit}"
                                            th:data-spec="${d.packagingSpec}"></option>
                                </select>
                            </td>
                            <td>
                                <input type="number" th:field="*{items[__${stat.index}__].quantity}" 
                                       class="form-control" min="1" required>
                            </td>
                            <td>
                                <input type="text" th:field="*{items[__${stat.index}__].unit}" 
                                       class="form-control unit-input" required>
                            </td>
                            <td>
                                <select th:field="*{items[__${stat.index}__].preferredsupplierId}" class="form-select">
                                    <option value="">-- Tùy chọn --</option>
                                    <option th:each="s : ${suppliers}" th:value="${s.supplierId}" th:text="${s.supplierName}"></option>
                                </select>
                            </td>
                            <td>
                                <input type="text" th:field="*{items[__${stat.index}__].reason}" class="form-control" placeholder="vd: nhu cầu tăng đột biến">
                            </td>
                            <td class="text-center">
                                <button type="button" class="btn btn-sm btn-outline-danger" onclick="removeRow(this)">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="mb-5">
            <button type="submit" class="btn btn-primary px-5">
                <i class="bi bi-check-lg"></i> Gửi dự trù
            </button>
            <a href="/purchase/requisitions" class="btn btn-secondary px-4 ms-2">Hủy</a>
        </div>
    </form>
</div>

<script th:inline="javascript">
    let rowCount = [[${requisitionRequest.items.size()}]];

    function addRow() {
        const table = document.getElementById('itemsTable').getElementsByTagName('tbody')[0];
        const newRow = table.rows[0].cloneNode(true);
        
        // Update indices
        const inputs = newRow.querySelectorAll('input, select');
        inputs.forEach(input => {
            const name = input.getAttribute('name');
            if (name) {
                input.setAttribute('name', name.replace(/\[\d+\]/, `[${rowCount}]`));
                input.setAttribute('id', input.getAttribute('id').replace(/_\d+_/, `_${rowCount}_`));
            }
            if (input.tagName === 'INPUT') input.value = '';
            if (input.tagName === 'SELECT') input.selectedIndex = 0;
        });

        table.appendChild(newRow);
        rowCount++;
        initSelectHandlers();
    }

    function removeRow(btn) {
        const table = document.getElementById('itemsTable').getElementsByTagName('tbody')[0];
        if (table.rows.length > 1) {
            btn.closest('tr').remove();
        }
    }

    function initSelectHandlers() {
        document.querySelectorAll('.drug-select').forEach(select => {
            select.onchange = function() {
                const selectedOption = this.options[this.selectedIndex];
                const unit = selectedOption.getAttribute('data-unit');
                const row = this.closest('tr');
                if (unit) {
                    row.querySelector('.unit-input').value = unit;
                }
            };
        });
    }

    document.addEventListener('DOMContentLoaded', initSelectHandlers);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
