<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/base :: head('Procurement Forecast')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4><i class="bi bi-file-earmark-text"></i> BM.01 Procurement Forecasts</h4>
        <a sec:authorize="hasAnyRole('PHARMACIST', 'WAREHOUSE_STAFF')"
           href="/purchase/requisitions/create" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Create New Forecast
        </a>
    </div>

    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Date</th>
                        <th>Created By</th>
                        <th>Status</th>
                        <th>Items</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${requisitions}">
                        <td th:text="${r.createdDate}"></td>
                        <td th:text="${r.createdBy.fullName}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${r.overallStatus.name() == 'APPROVED' ? 'bg-success' : 
                                                 (r.overallStatus.name() == 'PENDING' ? 'bg-warning' : 
                                                 (r.overallStatus.name() == 'REJECTED' ? 'bg-danger' : 'bg-info'))}"
                                  th:text="${r.overallStatus}"></span>
                        </td>
                        <td th:text="${r.items.size()}">0</td>
                        <td>
                            <a th:href="@{/purchase/requisitions/view/{id}(id=${r.requisitionID})}"
                               class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-eye"></i> View
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${requisitions.empty}">
                        <td colspan="5" class="text-center py-4 text-muted">No procurement forecasts found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
