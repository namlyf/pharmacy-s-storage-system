<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dự trù thuốc</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; }
        .navbar {
            background: #2c7be5; color: white;
            padding: 14px 24px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .navbar a { color: white; text-decoration: none; margin-left: 12px;
            background: rgba(255,255,255,0.2); padding: 6px 12px; border-radius: 4px; font-size: 14px; }
        .container { padding: 24px; max-width: 1100px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn { padding: 8px 16px; border-radius: 4px; border: none; cursor: pointer;
            text-decoration: none; font-size: 14px; }
        .btn-primary { background: #2c7be5; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        table { width: 100%; border-collapse: collapse; background: white;
            border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        th { background: #2c7be5; color: white; padding: 12px 16px; text-align: left; font-size: 14px; }
        td { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        tr:hover td { background: #f8f9fa; }
        .badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .badge-pending { background: #fff3cd; color: #856404; }
        .badge-approved { background: #d4edda; color: #155724; }
        .badge-rejected { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar('📋 Dự trù thuốc (BM.01)')}"></div>

<div th:if="${successMsg}" style="
    background: #d4edda; color: #155724;
    padding: 12px 24px; font-size: 14px;
    border-left: 4px solid #28a745;">
    <span th:text="${successMsg}"></span>
</div>

<div th:if="${errorMsg}" style="
    background: #f8d7da; color: #721c24;
    padding: 12px 24px; font-size: 14px;
    border-left: 4px solid #dc3545;">
    <span th:text="${errorMsg}"></span>
</div>

<div class="container">
    <div class="header">
        <h2>Danh sách phiếu dự trù</h2>
        <a th:if="${role != 'MANAGER'}" 
   th:href="@{/requisitions/create}" 
   class="btn btn-primary">+ Tạo dự trù mới</a>
    </div>

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Tên thuốc</th>
                <th>Hàm lượng</th>
                <th>Đơn vị</th>
                <th>Số lượng</th>
                <th>Ngày dự trù</th>
                <th>Lý do</th>
                <th>Người tạo</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="r : ${requisitions}">
                <td th:text="${r.requisitionId}"></td>
                <td th:text="${r.medicineName}"></td>
                <td th:text="${r.dosage}"></td>
                <td th:text="${r.unit}"></td>
                <td th:text="${r.quantity}"></td>
                <td th:text="${r.requisitionDate}"></td>
                <td th:text="${r.reason}"></td>
                <td th:text="${r.createdBy.fullName}"></td>
                <td>
                    <span th:class="${'badge badge-' + r.status.name().toLowerCase()}"
                          th:text="${r.status == T(com.hospital.pharmacy.entity.DrugRequisition.Status).PENDING ? 'Chờ duyệt' :
                                     r.status == T(com.hospital.pharmacy.entity.DrugRequisition.Status).APPROVED ? 'Đã duyệt' : 'Từ chối'}">
                    </span>
                </td>
                <td>
                    <!-- Chỉ MANAGER mới thấy nút duyệt/từ chối -->
                    <span th:if="${role == 'MANAGER' and r.status.name() == 'PENDING'}">
                        <form th:action="@{/requisitions/{id}/approve(id=${r.requisitionId})}" method="post" style="display:inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button class="btn btn-success" style="padding:4px 10px;font-size:12px;">Duyệt</button>
                        </form>
                        <form th:action="@{/requisitions/{id}/reject(id=${r.requisitionId})}" method="post" style="display:inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button class="btn btn-danger" style="padding:4px 10px;font-size:12px;">Từ chối</button>
                        </form>
                    </span>
                    <!-- Xóa -->
                    <form th:action="@{/requisitions/{id}/delete(id=${r.requisitionId})}" method="post" style="display:inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button class="btn btn-danger" style="padding:4px 10px;font-size:12px;"
                                onclick="return confirm('Xóa dự trù này?')">Xóa</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(requisitions)}">
                <td colspan="10" style="text-align:center; color:#888; padding:24px;">
                    Chưa có phiếu dự trù nào.
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
