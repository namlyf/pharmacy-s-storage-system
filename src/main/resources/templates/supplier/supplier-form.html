<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Thông tin nhà cung cấp')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<div class="container mt-4" style="max-width: 700px;">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">
                <span th:if="${supplierId == null}">
                    <i class="bi bi-plus-circle"></i> Thêm nhà cung cấp
                </span>
                <span th:unless="${supplierId == null}">
                    <i class="bi bi-pencil"></i> Chỉnh sửa nhà cung cấp
                </span>
            </h5>
        </div>
        <div class="card-body">
            <form th:action="${supplierId == null} ? '/suppliers/create' : '/suppliers/edit/' + ${supplierId}"
                  th:object="${supplierRequest}" method="post">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label fw-bold">Tên nhà cung cấp *</label>
                        <input type="text" th:field="*{supplierName}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('supplierName')} ? ' is-invalid'">
                        <div class="invalid-feedback"
                             th:errors="*{supplierName}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Số ĐKKD *</label>
                        <input type="text" th:field="*{licenseNumber}"
                               class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Mã số thuế</label>
                        <input type="text" th:field="*{taxCode}"
                               class="form-control">
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-bold">Địa chỉ *</label>
                        <textarea th:field="*{address}"
                                  class="form-control" rows="2"></textarea>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Người liên hệ</label>
                        <input type="text" th:field="*{contactPerson}"
                               class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Số điện thoại</label>
                        <input type="text" th:field="*{phone}"
                               class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Email</label>
                        <input type="email" th:field="*{email}"
                               class="form-control">
                    </div>
                    <div class="col-md-4" th:if="${supplierId != null}">
                        <label class="form-label fw-bold">Trạng thái</label>
                        <select th:field="*{active}" class="form-select">
                            <option th:value="true">Đang hoạt động</option>
                            <option th:value="false">Ngừng hoạt động</option>
                        </select>
                    </div>
                </div>
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i> Lưu
                    </button>
                    <a href="/suppliers" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Hủy
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
