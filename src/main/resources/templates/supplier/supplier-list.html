<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Nhà cung cấp')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<div class="container-fluid mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4><i class="bi bi-building"></i> Danh sách nhà cung cấp</h4>
        <a href="/suppliers/create" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Thêm nhà cung cấp
        </a>
    </div>

    <div th:if="${successMsg}" class="alert alert-success"
         th:text="${successMsg}"></div>
    <div th:if="${errorMsg}" class="alert alert-danger"
         th:text="${errorMsg}"></div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Tên nhà cung cấp</th>
                        <th>Số ĐKKD</th>
                        <th>Mã số thuế</th>
                        <th>Người liên hệ</th>
                        <th>Số điện thoại</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="s, i : ${suppliers}">
                        <td th:text="${i.count}"></td>
                        <td th:text="${s.supplierName}"></td>
                        <td th:text="${s.licenseNumber}"></td>
                        <td th:text="${s.taxCode}"></td>
                        <td th:text="${s.contactPerson}"></td>
                        <td th:text="${s.phone}"></td>
                        <td>
                            <span th:if="${s.active}"
                                  class="badge bg-success">Đang hoạt động</span>
                            <span th:unless="${s.active}"
                                  class="badge bg-danger">Ngừng hoạt động</span>
                        </td>
                        <td>
                            <a th:href="@{/suppliers/edit/{id}(id=${s.supplierID})}"
                               class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:if="${s.active}"
                                  th:action="@{/suppliers/deactivate/{id}(id=${s.supplierID})}"
                                  method="post" style="display:inline;">
                                <button class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('Ngừng hoạt động?')">
                                    <i class="bi bi-x-circle"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(suppliers)}">
                        <td colspan="8" class="text-center text-muted py-4">
                            Không tìm thấy nhà cung cấp.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
