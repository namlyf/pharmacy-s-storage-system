<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/base :: head('Đăng ký lô hàng')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<div class="container mt-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/purchase/orders/view/{id}(id=${order.orderID})}">Chi tiết đơn hàng</a></li>
            <li class="breadcrumb-item active">Đăng ký lô hàng</li>
        </ol>
    </nav>

    <h4><i class="bi bi-box-seam"></i> Đăng ký lô thuốc nhập kho</h4>
    <p class="text-muted">Đăng ký lô cho thuốc: <strong th:text="${drug.drugName}"></strong> (Đơn hàng: <span th:text="${order.orderID}"></span>)</p>
    <hr>

    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

    <form th:action="@{/warehouse/batches/create}" th:object="${batchRequest}" method="post" class="row g-3">
        <input type="hidden" th:field="*{orderId}">
        <input type="hidden" th:field="*{drugId}">

        <div class="col-md-6">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-light fw-bold">Thông tin lô hàng</div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Số lô</label>
                        <input type="text" th:field="*{lotNumber}" class="form-control" required placeholder="vd: LOT12345">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Ngày sản xuất</label>
                            <input type="date" th:field="*{manufactureDate}" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Hạn sử dụng (HSD)</label>
                            <input type="date" th:field="*{expirationDate}" class="form-control" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Số lượng nhập</label>
                        <input type="number" th:field="*{quantityReceived}" class="form-control" required min="1">
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-light fw-bold">Hóa đơn & Bảo quản</div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Số hóa đơn</label>
                        <input type="text" th:field="*{invoiceNumber}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Ngày hóa đơn</label>
                        <input type="date" th:field="*{invoiceDate}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Điều kiện bảo quản (Theo nhãn)</label>
                        <input type="text" th:field="*{storageCondition}" class="form-control" 
                               th:placeholder="${drug.storageCondition}">
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 mt-4 mb-5">
            <button type="submit" class="btn btn-primary px-5">
                <i class="bi bi-check-circle"></i> Đăng ký lô hàng
            </button>
            <a th:href="@{/purchase/orders/view/{id}(id=${order.orderID})}" class="btn btn-secondary px-4 ms-2">Hủy</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
