<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/base :: head('Quản lý lô hàng')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4><i class="bi bi-boxes"></i> Danh sách lô thuốc đã đăng ký</h4>
    </div>

    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Tên thuốc</th>
                        <th>Số lô</th>
                        <th>Hạn sử dụng</th>
                        <th>SL nhập</th>
                        <th>Số hóa đơn</th>
                        <th>Nhà cung cấp</th>
                        <th>Trạng thái</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="b : ${batches}">
                        <td th:text="${b.drug.drugName}"></td>
                        <td><code th:text="${b.lotNumber}"></code></td>
                        <td th:text="${b.expirationDate}"></td>
                        <td th:text="${b.quantityReceived}"></td>
                        <td th:text="${b.invoiceNumber}"></td>
                        <td th:text="${b.order.supplier.supplierName}"></td>
                        <td>
                            <div sec:authorize="hasRole('WAREHOUSE_STAFF')">
                                <!-- Trạng thái: Đã có trong biên bản chính thức -->
                                <span th:if="${#lists.contains(inspectedBatchIds, b.batchID)}" class="badge bg-success">
                                    <i class="bi bi-check-all"></i> Đã lập biên bản
                                </span>

                                <!-- Trạng thái: Đang nằm trong danh sách chờ gửi (Working List) -->
                                <span th:if="${#lists.contains(workingBatchIds, b.batchID)}" class="badge bg-warning text-dark">
                                    <i class="bi bi-hourglass-split"></i> Chờ gửi duyệt
                                </span>

                                <!-- Nút: Thêm vào biên bản (Chỉ hiện nếu chưa có ở cả 2 nơi trên) -->
                                <button th:if="${!#lists.contains(inspectedBatchIds, b.batchID) && !#lists.contains(workingBatchIds, b.batchID)}"
                                        type="button" class="btn btn-sm btn-primary" 
                                        data-bs-toggle="modal" 
                                        th:data-bs-target="'#inspectModal-' + ${b.batchID}">
                                    <i class="bi bi-plus-circle"></i> Thêm vào biên bản
                                </button>

                                <!-- Modal nhập thông tin kiểm nhập (Giữ nguyên) -->
                                <div th:if="${!#lists.contains(inspectedBatchIds, b.batchID) && !#lists.contains(workingBatchIds, b.batchID)}"
                                     class="modal fade" th:id="'inspectModal-' + ${b.batchID}" tabindex="-1">
                                    <div class="modal-dialog">
                                        <div class="modal-content">
                                            <form th:action="@{/inspection/reports/add-to-list}" method="post">
                                                <input type="hidden" name="batchId" th:value="${b.batchID}">
                                                <div class="modal-header">
                                                    <h5 class="modal-title">Kiểm nhập lô: [[${b.lotNumber}]]</h5>
                                                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                                </div>
                                                <div class="modal-body text-start">
                                                    <div class="mb-3">
                                                        <label class="form-label">Giá nhập VAT (đơn vị nhỏ nhất)</label>
                                                        <input type="number" name="vatPrice" class="form-control" required>
                                                    </div>
                                                    <div class="mb-3">
                                                        <label class="form-label">Kết quả cảm quan</label>
                                                        <textarea name="visualQualityResult" class="form-control" rows="2" placeholder="Ví dụ: Bao bì nguyên vẹn, thuốc không đổi màu..."></textarea>
                                                    </div>
                                                    <div class="form-check mb-2">
                                                        <input class="form-check-input" type="checkbox" name="invoiceValid" checked id="check1">
                                                        <label class="form-check-label" for="check1">Hóa đơn hợp lệ</label>
                                                    </div>
                                                    <div class="form-check mb-2">
                                                        <input class="form-check-input" type="checkbox" name="storageConditionMatch" checked id="check2">
                                                        <label class="form-check-label" for="check2">Điều kiện bảo quản khớp</label>
                                                    </div>
                                                </div>
                                                <div class="modal-footer">
                                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                                                    <button type="submit" class="btn btn-primary">Xác nhận thêm</button>
                                                </div>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${batches.empty}">
                        <td colspan="7" class="text-center py-4 text-muted">Chưa có lô thuốc nào được đăng ký.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
