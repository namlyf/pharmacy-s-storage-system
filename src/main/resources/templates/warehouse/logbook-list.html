<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/base :: head('Sổ kiểm nhập')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<div class="container-fluid mt-4 px-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4><i class="bi bi-journal-text"></i> BM.05 Sổ kiểm nhập</h4>
        <button class="btn btn-outline-success btn-sm" onclick="window.print()">
            <i class="bi bi-file-earmark-excel"></i> Xuất file / In
        </button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-sm align-middle mb-0" style="font-size: 0.85rem;">
                    <thead class="table-light">
                        <tr class="text-center">
                            <th>Ngày nhập</th>
                            <th>Số hóa đơn</th>
                            <th>Nhà cung cấp</th>
                            <th>Tên thuốc, nồng độ/hàm lượng</th>
                            <th>ĐV tính</th>
                            <th>SL</th>
                            <th>Số lô</th>
                            <th>Hạn dùng</th>
                            <th>Đơn giá (+VAT)</th>
                            <th>Thành tiền</th>
                            <th>Người ghi sổ</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="l : ${logs}">
                            <td class="text-center" th:text="${l.logDate}"></td>
                            <td class="text-center" th:text="${l.invoiceNumber}"></td>
                            <td th:text="${l.supplier.supplierName}"></td>
                            <td>
                                <strong th:text="${l.drugNameSnapshot}"></strong><br>
                                <small class="text-muted" th:text="${l.concentrationSnapshot}"></small>
                            </td>
                            <td class="text-center" th:text="${l.unit}"></td>
                            <td class="text-center" th:text="${l.quantity}"></td>
                            <td class="text-center"><code th:text="${l.lotNumber}"></code></td>
                            <td class="text-center" th:text="${l.expirationDate}"></td>
                            <td class="text-end" th:text="${#numbers.formatDecimal(l.unitPriceVAT, 0, 'COMMA', 0, 'POINT')}"></td>
                            <td class="text-end"><strong th:text="${#numbers.formatDecimal(l.totalAmount, 0, 'COMMA', 0, 'POINT')}"></strong></td>
                            <td class="text-center" th:text="${l.enteredBy.fullName}"></td>
                        </tr>
                        <tr th:if="${logs.empty}">
                            <td colspan="11" class="text-center py-4 text-muted">Sổ kiểm nhập chưa có dữ liệu.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<style>
    @media print {
        .navbar, .btn, .breadcrumb { display: none !important; }
        .container-fluid { width: 100% !important; padding: 0 !important; }
        table { font-size: 0.7rem !important; }
    }
</style>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
