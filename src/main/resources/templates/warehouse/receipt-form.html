<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/base :: head('Lập Phiếu Nhập Kho')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<div class="container mt-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/inspection/reports/view/{id}(id=${report.reportID})}">Biên bản kiểm nhập</a></li>
            <li class="breadcrumb-item active">Lập phiếu nhập kho</li>
        </ol>
    </nav>

    <h4><i class="bi bi-receipt-cutoff"></i> BM.04 Phiếu nhập kho (Mẫu C21)</h4>
    <hr>

    <div class="row mb-4">
        <div class="col-md-12">
            <div class="card bg-light border-0">
                <div class="card-body py-3">
                    <div class="row">
                        <div class="col-md-3"><strong>Thuốc:</strong> <span th:text="${report.batch.drug.drugName}"></span></div>
                        <div class="col-md-3"><strong>Số lô:</strong> <code th:text="${report.batch.lotNumber}"></code></div>
                        <div class="col-md-3"><strong>Số lượng:</strong> <span th:text="${report.batch.quantityReceived}"></span></div>
                        <div class="col-md-3"><strong>Giá nhập:</strong> <span th:text="${#numbers.formatDecimal(report.vatPrice, 0, 'COMMA', 0, 'POINT') + ' VND'}"></span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <form th:action="@{/warehouse/receipts/create}" th:object="${receiptRequest}" method="post" class="mb-5">
        <input type="hidden" th:field="*{reportId}">

        <div class="row">
            <div class="col-md-6">
                <div class="card shadow-sm mb-4 h-100">
                    <div class="card-header bg-white fw-bold">Thông tin phiếu nhập</div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Ngày nhập kho</label>
                            <input type="date" th:field="*{receiptDate}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mã vạch (Barcode)</label>
                            <input type="text" th:field="*{barcode}" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mã kế toán</label>
                            <input type="text" th:field="*{accountingCode}" class="form-control">
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow-sm mb-4 h-100">
                    <div class="card-header bg-white fw-bold">Giá bán niêm yết</div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Giá BHYT</label>
                            <div class="input-group">
                                <input type="number" th:field="*{bhytPrice}" class="form-control" step="0.01">
                                <span class="input-group-text">VND</span>
                            </div>
                        </div>
                        <div class="alert alert-warning small">
                            <i class="bi bi-info-circle"></i> 
                            <strong>Giá bán lẻ</strong> sẽ được hệ thống tự động tính toán sau khi lưu dựa trên 
                            biểu thặng số 5 tầng quy định tại SOP 01-GPP.
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-success px-5">
                <i class="bi bi-box-arrow-in-down"></i> Xác nhận nhập kho
            </button>
            <a th:href="@{/inspection/reports/view/{id}(id=${report.reportID})}" class="btn btn-secondary px-4 ms-2">Hủy bỏ</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
