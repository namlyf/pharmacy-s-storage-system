<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/base :: head('Create Warehouse Receipt')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<div class="container mt-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/inspection/reports/view/{id}(id=${report.reportID})}">Inspection Report</a></li>
            <li class="breadcrumb-item active">Issue Warehouse Receipt</li>
        </ol>
    </nav>

    <h4><i class="bi bi-receipt-cutoff"></i> BM.04 Warehouse Receipt (Form C21)</h4>
    <hr>

    <div class="row mb-4">
        <div class="col-md-12">
            <div class="card bg-light border-0">
                <div class="card-body py-3">
                    <div class="row">
                        <div class="col-md-3"><strong>Drug:</strong> <span th:text="${report.batch.drug.drugName}"></span></div>
                        <div class="col-md-3"><strong>Lot No:</strong> <code th:text="${report.batch.lotNumber}"></code></div>
                        <div class="col-md-3"><strong>Qty:</strong> <span th:text="${report.batch.quantityReceived}"></span></div>
                        <div class="col-md-3"><strong>Import Price:</strong> <span th:text="${#numbers.formatDecimal(report.vatPrice, 0, 'COMMA', 2, 'POINT') + ' VND'}"></span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <form th:action="@{/warehouse/receipts/create}" th:object="${receiptRequest}" method="post" class="mb-5">
        <input type="hidden" th:field="*{reportId}">

        <div class="row">
            <div class="col-md-6">
                <div class="card shadow-sm mb-4 h-100">
                    <div class="card-header bg-white fw-bold">Receipt Details</div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Receipt Date</label>
                            <input type="date" th:field="*{receiptDate}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Barcode (Mã vạch)</label>
                            <input type="text" th:field="*{barcode}" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Accounting Code (Mã kế toán)</label>
                            <input type="text" th:field="*{accountingCode}" class="form-control">
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow-sm mb-4 h-100">
                    <div class="card-header bg-white fw-bold">Pricing</div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Health Insurance Price (Giá BHYT)</label>
                            <div class="input-group">
                                <input type="number" th:field="*{bhytPrice}" class="form-control" step="0.01">
                                <span class="input-group-text">VND</span>
                            </div>
                        </div>
                        <div class="alert alert-warning small">
                            <i class="bi bi-info-circle"></i> 
                            The <strong>Retail Price</strong> will be calculated automatically upon submission 
                            using the 5-tier markup schedule defined in SOP 01-GPP.
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-success px-5">
                <i class="bi bi-box-arrow-in-down"></i> Confirm Warehouse Entry
            </button>
            <a th:href="@{/inspection/reports/view/{id}(id=${report.reportID})}" class="btn btn-secondary px-4 ms-2">Cancel</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
