<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/base :: head('Phiếu nhập kho')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4><i class="bi bi-receipt"></i> BM.04 Phiếu nhập kho (Mẫu C21-HD)</h4>
    </div>

    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Ngày nhập</th>
                        <th>Danh sách thuốc (Số lô)</th>
                        <th>Tổng tiền phiếu</th>
                        <th>Người lập phiếu</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${receipts}">
                        <td th:text="${r.receiptDate}"></td>
                        <td>
                            <ul class="list-unstyled mb-0 small">
                                <li th:each="item : ${r.report.items}">
                                    <i class="bi bi-dot"></i> [[${item.batch.drug.drugName}]] 
                                    (Lô: [[${item.batch.lotNumber}]])
                                </li>
                            </ul>
                        </td>
                        <td><strong th:text="${#numbers.formatDecimal(r.totalAmount, 0, 'COMMA', 0, 'POINT') + ' đ'}"></strong></td>
                        <td th:text="${r.enteredBy.fullName}"></td>
                        <td>
                            <a th:href="@{/warehouse/receipts/view/{id}(id=${r.receiptID})}"
                               class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-printer"></i> In mẫu C21
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${receipts.empty}">
                        <td colspan="5" class="text-center py-4 text-muted">Chưa có phiếu nhập kho nào được lập.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
